name: Run PHPUnit Tests

on:
    push:
        branches:
            - '*'

jobs:
    run_tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v2

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.1'

            - name: Install dependencies
              run: composer install

            - name: Run PHPUnit
              run: ./bin/phpunit